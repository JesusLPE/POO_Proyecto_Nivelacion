{% extends "base.html" %}
{% block content %}
<h1>Registrar Nota</h1>
<form method="post">
    <label>Matrícula del estudiante:</label>
    <select name="matricula">
        {% for e in estudiantes %}
        <option value="{{ e.matricula }}">{{ e.matricula }} - {{ e.nombre }}</option>
        {% endfor %}
    </select><br>
    <label>Asignatura:</label><input type="text" name="asignatura" required><br>
    <label>Nota:</label><input type="number" step="0.1" name="nota" required><br>
    <button type="submit">Registrar</button>
</form>
{% endblock %}
