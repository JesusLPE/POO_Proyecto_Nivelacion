{% extends "base.html" %}
{% block content %}
<h1>Mi Perfil</h1>
<form method="post">
    <label>Nombre:</label>
    <input type="text" name="nombre" value="{{ usuario.nombre }}" {% if usuario.obtener_rol() != 'estudiante' %}disabled{% endif %}>
    <label>Apellido:</label>
    <input type="text" name="apellido" value="{{ usuario.apellido }}" {% if usuario.obtener_rol() != 'estudiante' %}disabled{% endif %}>
    <label>Email:</label>
    <input type="email" value="{{ usuario.email }}" disabled>
    {% if usuario.obtener_rol() == 'estudiante' %}
        <label>Carrera:</label>
        <input type="text" name="carrera" value="{{ usuario.carrera }}">
        <button type="submit">Actualizar perfil</button>
    {% else %}
        <p><em>Los datos solo pueden ser modificados por el estudiante.</em></p>
    {% endif %}
</form>
{% endblock %}
